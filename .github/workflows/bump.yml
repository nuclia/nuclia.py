# Bump version when the `bump` label is added to a PR.
#
# Lives in its own file so that label events never trigger the main nuclia.yml
# workflow. If nuclia.yml listened to `labeled`, every label add would create
# skipped check runs for the test jobs — overriding passing ones and blocking
# branch-protection merges.
#
# Flow:
#   1. Developer adds `bump` label to a PR.
#   2. Commitizen auto-detects the increment from conventional commits
#      (patch fallback if no conventional commits are present).
#   3. Bot commits the version bump + updated CHANGELOG.md to the branch.
#   4. Bot automatically adds the `release` label.
#   5. Developer reviews changelog, gets PR approved, and merges.
#      publish-pypi in nuclia.yml tags the merge commit and uploads to PyPI.
#
# If you need a different increment than what commitizen auto-detects, edit
# VERSION and CHANGELOG.md manually before adding the `bump` label.

name: Bump version

on:
  pull_request:
    branches: [main]
    types: [labeled]

jobs:
  bump-version:
    # Triggered by adding the `bump` label to a PR.
    # The `release` label is added by the bot after the bump, NOT directly by the
    # developer. This ensures publish-pypi only fires on PRs that went through the
    # bump job — preventing accidental publishes without a version increment.
    name: Bump version and update changelog
    if: github.event.label.name == 'bump'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git identity for bot commit
        run: |
          git config user.email "nuclia-service-bot[bot]@users.noreply.github.com"
          git config user.name "nuclia-service-bot[bot]"

      - name: Bump version and update changelog
        run: |
          # Anchor tag: only needed when VERSION was manually set to a value with no
          # remote tag yet (e.g. initial 4.10.0 set without a published release).
          # fetch-depth: 0 already fetches all remote tags, so on the normal path
          # (every version comes from a previous publish) this is a no-op.
          git tag "$(uv version --short)" || true
          cz bump --allow-no-commit --changelog --yes

      - name: Push bump commit
        run: git push origin HEAD:${{ github.head_ref }}

      - name: Add release label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label release

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(uv version --short)
          gh pr comment ${{ github.event.pull_request.number }} --body "**Version bumped to \`${VERSION}\`.**

          The version and changelog have been updated and the \`release\` label has been added.
          - Edit \`CHANGELOG.md\` on this branch if you want to adjust the release notes.
          - Merging this PR will publish \`${VERSION}\` to PyPI automatically.
          - If you need to cancel the release, remove the \`release\` label before merging."
