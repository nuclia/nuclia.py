# Reusable workflow: publishes the SDK docs to S3.
#
# This file serves two purposes:
#
#   1. Single source of truth — nuclia.yml calls this via workflow_call after
#      a successful PyPI release so the job definition lives here only.
#
#   2. Standalone execution — can be triggered outside of a PR via
#      workflow_dispatch from the GitHub Actions UI (e.g. to force a docs
#      re-sync without cutting a new release).
#
name: Publish docs

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

