# Main CI/CD workflow for the nuclia package.
#
# This is the single entry point for all PR, merge, and release operations.
#
# Release flow:
#   1. Run workflow manually (Actions tab) to trigger prepare-release.
#   2. prepare-release runs commitizen, opens a PR on release/auto with the
#      version bump + changelog already committed, and adds the "release" label.
#   3. Tests run automatically on the new PR (pull_request: opened trigger).
#   4. Team reviews changelog, approves, and merges.
#   5. publish-pypi fires on merge: tags the merge commit, builds, uploads to PyPI.
#   6. publish-docs fires after publish-pypi.
#
# Job dependency graph (PR tests):
#
#   test-stage ──┐
#   test-prod  ──┼── publish-pypi ── publish-docs  (release PRs only)
#   test-windows─┘
#
name: Nuclia

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed, labeled]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Bump type override (patch / minor / major). Leave empty to auto-detect from conventional commits.'
        required: false
        default: ''

# All test jobs: run on open/sync/reopen AND on merge, but NOT on close-without-merge.
# Condition used: github.event.action != 'closed' || github.event.pull_request.merged == true

permissions: {}

jobs:
  check-changes:
    name: Check changed files
    if: github.event_name == 'pull_request' && github.event.action != 'labeled' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read   # actions/checkout, dorny/paths-filter
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            relevant:
              - 'nuclia/**'
              - '.github/workflows/**'

  test-stage:
    name: Test (stage)
    needs: [check-changes]
    if: needs.check-changes.outputs.relevant == 'true' && github.head_ref != 'release/auto'
    permissions:
      contents: read   # stage.yml -> actions/checkout
    uses: ./.github/workflows/stage.yml
    secrets:
      STAGE_TESTING_SERVICE_TOKEN: ${{ secrets.STAGE_TESTING_SERVICE_TOKEN }}
      STAGE_TESTING_TOKEN: ${{ secrets.STAGE_TESTING_TOKEN }}
      TEST_EUROPE1_STASHIFY_NUA: ${{ secrets.TEST_EUROPE1_STASHIFY_NUA }}
      STAGE_TESTING_AGENT_TOKEN: ${{ secrets.STAGE_TESTING_AGENT_TOKEN }}
      STAGE_TESTING_AGENT_NO_MEM_TOKEN: ${{ secrets.STAGE_TESTING_AGENT_NO_MEM_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-prod:
    name: Test (prod)
    needs: [check-changes]
    if: needs.check-changes.outputs.relevant == 'true' && github.head_ref != 'release/auto'
    permissions:
      contents: read   # prod.yml -> actions/checkout
    uses: ./.github/workflows/prod.yml
    secrets:
      PROD_TESTING_SERVICE_TOKEN: ${{ secrets.PROD_TESTING_SERVICE_TOKEN }}
      PROD_TESTING_TOKEN: ${{ secrets.PROD_TESTING_TOKEN }}
      PROD_TESTING_NUA: ${{ secrets.PROD_TESTING_NUA }}
      PROD_TESTING_AGENT_TOKEN: ${{ secrets.PROD_TESTING_AGENT_TOKEN }}
      PROD_TESTING_AGENT_NO_MEM_TOKEN: ${{ secrets.PROD_TESTING_AGENT_NO_MEM_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-windows:
    name: Test (windows)
    needs: [check-changes]
    if: needs.check-changes.outputs.relevant == 'true' && github.head_ref != 'release/auto'
    permissions:
      contents: read   # windows.yml -> actions/checkout
    uses: ./.github/workflows/windows.yml
    secrets:
      PROD_API_KEY_FOR_WINDOWS_TEST: ${{ secrets.PROD_API_KEY_FOR_WINDOWS_TEST }}

  prepare-release-commit:
    name: Bump version and update changelog
    if: github.event.action == 'labeled' && github.event.label.name == 'release'
    runs-on: ubuntu-latest
    permissions: {}   # all GitHub API calls use the app token; GITHUB_TOKEN unused
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia
          repositories: nuclia.py
          permission-contents: write         # git push HEAD:$GITHUB_HEAD_REF
          permission-pull-requests: write    # gh pr comment

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git identity for bot commit
        run: |
          git config user.email "nuclia-service-bot[bot]@users.noreply.github.com"
          git config user.name "nuclia-service-bot[bot]"

      - name: Bump version and update changelog
        run: |
          # Anchor tag: only needed when VERSION was manually set to a value with no
          # remote tag yet (e.g. initial 4.10.0 set without a published release).
          # fetch-depth: 0 already fetches all remote tags, so on the normal path
          # (every version comes from a previous publish) this is a no-op.
          git tag "$(uv version --short)" || true
          cz bump --allow-no-commit --changelog --yes

      - name: Delete local tag (tag will be created on the merge commit instead)
        run: git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(uv version --short)
          gh pr comment ${{ github.event.pull_request.number }} --body "**Release \`${VERSION}\` is ready.**

          The version and changelog have been updated by the bot. You can:
          - Edit \`CHANGELOG.md\` to adjust the release notes
          - Push additional commits if needed, but won't be automatically included in the release notes after this.

          Once you're happy, merge this PR and \`${VERSION}\` will be published to PyPI automatically."

  prepare-release:
    name: Prepare release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: {}   # all GitHub API calls use the app token; GITHUB_TOKEN unused
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia
          repositories: nuclia.py
          permission-contents: write         # git push release/auto
          permission-pull-requests: write    # gh pr create

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git identity for bot commit
        run: |
          git config user.email "nuclia-service-bot[bot]@users.noreply.github.com"
          git config user.name "nuclia-service-bot[bot]"

      - name: Create release branch
        run: |
          git push origin --delete release/auto || true
          git checkout -b release/auto

      - name: Bump version and update changelog
        run: |
          # Anchor tag: only needed when VERSION was manually set to a value with no
          # remote tag yet (e.g. initial 4.10.0 set without a published release).
          # fetch-depth: 0 already fetches all remote tags, so on the normal path
          # (every version comes from a previous publish) this is a no-op.
          git tag "$(uv version --short)" || true
          if [ -n "${INPUTS_BUMP_TYPE}" ]; then
            cz bump --increment "${INPUTS_BUMP_TYPE}" --changelog --yes
          else
            cz bump --allow-no-commit --changelog --yes
          fi
        env:
          INPUTS_BUMP_TYPE: ${{ inputs.bump_type }}

      - name: Delete local tag (tag will be created on the merge commit instead)
        run: git tag -d "$(uv version --short)" || true

      - name: Push release branch
        run: git push origin release/auto

      - name: Open release PR with label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(uv version --short)
          gh pr create \
            --title "chore: release ${VERSION}" \
            --body "Automated release PR. Review the changelog and merge to publish to PyPI." \
            --label release \
            --base main \
            --head release/auto

  publish-pypi:
    name: Publish to PyPI
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release') &&
      (
        contains(github.event.pull_request.labels.*.name, 'break-glass') ||
        (
          !contains(needs.*.result, 'failure') &&
          !contains(needs.*.result, 'cancelled')
        )
      )
    needs: [test-stage, test-prod, test-windows]
    runs-on: ubuntu-latest
    environment: pypi  # requires approval from designated reviewers (repo Settings → Environments)
    permissions:
      id-token: write   # pypa/gh-action-pypi-publish (OIDC)
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia
          repositories: nuclia.py
          permission-contents: write         # git push tag

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Configure git identity for bot commit
        run: |
          git config user.email "nuclia-service-bot[bot]@users.noreply.github.com"
          git config user.name "nuclia-service-bot[bot]"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: false

      - name: Tag release commit
        run: |
          VERSION=$(uv version --short)
          git tag "${VERSION}"
          git push origin "${VERSION}"

      - name: Build package
        run: uv build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-docs:
    name: Publish docs
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')
    needs: [publish-pypi]
    permissions:
      id-token: write   # docs.yml -> aws-actions/configure-aws-credentials (OIDC)
      contents: read    # docs.yml -> actions/checkout
    uses: ./.github/workflows/docs.yml
    secrets:
      AWS_DOCS_SYNC_ROLE: ${{ secrets.AWS_DOCS_SYNC_ROLE }}
      AWS_DOCS_SYNC_REGION: ${{ secrets.AWS_DOCS_SYNC_REGION }}
      DOCS_STORAGE: ${{ secrets.DOCS_STORAGE }}

