name: Test on rag.progress.cloud

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  repository_dispatch:
    types: [test-prod]

concurrency:
  group: ${{ github.workflow }}

jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.9.20"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install package
        run: |
          uv sync --no-editable --all-extras

      - name: Run pre-checks
        run: |
          source .venv/bin/activate
          make lint

      - name: Test
        run: |
          source .venv/bin/activate
          GA_TESTING_SERVICE_TOKEN="${{ secrets.PROD_TESTING_SERVICE_TOKEN }}" GA_TESTING_TOKEN="${{ secrets.PROD_TESTING_TOKEN }}" GA_TESTING_NUA="${{secrets.PROD_TESTING_NUA }}" GA_TESTING_AGENT_TOKEN="${{secrets.PROD_TESTING_AGENT_TOKEN }}" GA_TESTING_AGENT_NO_MEM_TOKEN="${{secrets.PROD_TESTING_AGENT_NO_MEM_TOKEN }}" DEBUG_HTTPX_REQUESTS="true" make test-cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          flags: prod
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
