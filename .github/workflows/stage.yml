# Reusable workflow: tests against the stage environment (stashify.cloud).
#
# This file serves two purposes:
#
#   1. Single source of truth — nuclia.yml calls this via workflow_call so
#      the job definition lives here only, not duplicated.
#
#   2. Standalone execution — can be triggered outside of a PR via:
#        - workflow_dispatch:   manual run from the GitHub Actions UI
#        - repository_dispatch: triggered programmatically by other systems
#          (e.g. after a stage deployment to verify the new build)
#
name: Test (stage)

on:
  workflow_call:
    inputs:
      skip:
        description: 'If true, skip pytest (bump-only commit — parent tests already passed).'
        required: false
        type: string
        default: 'false'
  workflow_dispatch:
  repository_dispatch:
    type: test-stage

jobs:
  test-stage:
    name: Test (stage)
    runs-on: ubuntu-latest
    steps:
      - name: Skip (bump-only commit)
        if: inputs.skip == 'true'
        run: echo "Tests skipped — last commit only changed CHANGELOG.md / pyproject.toml and parent tests passed."
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: inputs.skip != 'true'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: inputs.skip != 'true'
        with:
          python-version: "3.9.20"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        if: inputs.skip != 'true'
      - name: Install package
        if: inputs.skip != 'true'
        run: uv sync --no-editable --all-extras
      - name: Lint
        if: inputs.skip != 'true'
        run: |
          source .venv/bin/activate
          make lint
      - name: Test
        if: inputs.skip != 'true'
        run: |
          source .venv/bin/activate
          BASE_NUCLIA_DOMAIN="stashify.cloud" \
          GA_TESTING_SERVICE_TOKEN="${{ secrets.STAGE_TESTING_SERVICE_TOKEN }}" \
          GA_TESTING_TOKEN="${{ secrets.STAGE_TESTING_TOKEN }}" \
          GA_TESTING_NUA="${{ secrets.TEST_EUROPE1_STASHIFY_NUA }}" \
          GA_TESTING_AGENT_TOKEN="${{ secrets.STAGE_TESTING_AGENT_TOKEN }}" \
          GA_TESTING_AGENT_NO_MEM_TOKEN="${{ secrets.STAGE_TESTING_AGENT_NO_MEM_TOKEN }}" \
          DEBUG_HTTPX_REQUESTS="true" \
          make test-cov
      - uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        if: inputs.skip != 'true'
        with:
          flags: stage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
