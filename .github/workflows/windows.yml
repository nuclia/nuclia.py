# Reusable workflow: basic smoke test on Windows.
#
# This file serves two purposes:
#
#   1. Single source of truth — nuclia.yml calls this via workflow_call so
#      the job definition lives here only, not duplicated.
#
#   2. Standalone execution — can be triggered outside of a PR via
#      workflow_dispatch from the GitHub Actions UI.
#
name: Test (windows)

on:
  workflow_call:
    inputs:
      skip:
        description: 'If true, skip the test (bump-only commit — parent tests already passed).'
        required: false
        type: string
        default: 'false'
    secrets:
      PROD_API_KEY_FOR_WINDOWS_TEST:
        required: true
  workflow_dispatch:

jobs:
  test-windows:
    name: Test (windows)
    runs-on: windows-latest
    permissions:
      contents: read   # actions/checkout
    steps:
      - name: Skip (bump-only commit)
        if: inputs.skip == 'true'
        run: echo "Tests skipped — last commit only changed CHANGELOG.md / pyproject.toml and parent tests passed."
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
        if: inputs.skip != 'true'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: inputs.skip != 'true'
        with:
          python-version: "3.9"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        if: inputs.skip != 'true'
      - name: Install package
        if: inputs.skip != 'true'
        run: uv sync --no-editable --all-extras
      - name: Test
        if: inputs.skip != 'true'
        run: uv run nuclia kb list --url="https://europe-1.rag.progress.cloud/api/v1/kb/eb720a59-f879-4b23-a995-605f91c874f4" --api_key="${{ secrets.PROD_API_KEY_FOR_WINDOWS_TEST }}"
